# .github/workflows/terraform-ci.yml
#
# Runs on every push to main and every pull request.
# Validates formatting, syntax, and generates a plan before any merge.
# Apply is never automated — human review required.

name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.11.0"
  AWS_REGION: "us-east-1"

jobs:
  terraform:
    name: Terraform CI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        # Fails the pipeline if any .tf file is not correctly formatted.
        # Enforces consistent code style across the entire project.

      - name: Terraform Init
        id: init
        run: terraform init
        # Downloads the AWS provider and connects to the S3 backend.
        # Same backend config as local development.

      - name: Terraform Validate
        id: validate
        run: terraform validate
        # Validates HCL syntax and internal consistency.
        # Catches missing variables, invalid references, and type errors.

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color
        # Only runs on pull requests.
        # Shows exactly what would change before any code merges.
        # Output is visible in the Actions log.
